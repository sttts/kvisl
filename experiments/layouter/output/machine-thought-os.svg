  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">An operating system for machine thought</text><text x="52" y="139.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">The thinking model requests parallelism. The inference engine decides when it runs.</text><text x="65" y="193.5" text-anchor="start" fill="#cae5fb" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">THINKING MODEL · USER MODE</text><text x="184" y="250.75" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Parent completion</text><text x="184" y="271" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">shared history</text><text x="629.25" y="250.75" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">&lt;Parallel&gt;</text><text x="629.25" y="271" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">system call: fork</text><text x="1050.5" y="250.75" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Parent resumes</text><text x="1050.5" y="271" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">&lt;Conclusion&gt;</text><text x="65" y="408.25" text-anchor="start" fill="#4b5563" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">SGLANG · INFERENCE ENGINE / KERNEL</text><text x="195.25" y="481.5" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Interpreter</text><text x="195.25" y="501.75" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">creates child</text><text x="195.25" y="522" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">requests</text><text x="462.5" y="481.5" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">TAPER scheduler</text><text x="462.5" y="501.75" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">admit per forward</text><text x="462.5" y="522" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">pass</text><text x="621.5" y="474.5" text-anchor="start" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">NEXT GPU FORWARD PASS</text><text x="756.5" y="531.75" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Child A</text><text x="756.5" y="552" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">running</text><text x="756.5" y="620.25" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Child B</text><text x="756.5" y="640.5" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">running</text><text x="756.5" y="730.75" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Child C</text><text x="756.5" y="751" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ready, deferred this</text><text x="756.5" y="771.25" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">pass</text><text x="1050.5" y="481.5" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">wait()</text><text x="1050.5" y="501.75" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">join KV views</text><text x="195.25" y="590.25" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Shared prefix KV blocks</text><text x="195.25" y="610.5" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">+ small branch-local state</text><text x="756.5" y="421.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">continuous batching · radix KV cache</text><text x="617.25" y="932" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Model chooses the work graph. Engine chooses</text><text x="617.25" y="952.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">the schedule.</text></g>

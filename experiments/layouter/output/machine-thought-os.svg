  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">An operating system for machine thought</text><text x="52" y="139.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">The thinking model requests parallelism. The inference engine decides</text><text x="52" y="163.5" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">when it runs.</text><text x="65" y="217.8" text-anchor="start" fill="#cae5fb" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">THINKING MODEL · USER MODE</text><text x="158.125" y="275.05" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Parent completion</text><text x="158.125" y="295.3" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">shared history</text><text x="372.375" y="275.05" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">&lt;Parallel&gt;</text><text x="372.375" y="295.3" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">system call: fork</text><text x="550.25" y="275.05" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Parent resumes</text><text x="550.25" y="295.3" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">&lt;Conclusion&gt;</text><text x="65" y="452.55" text-anchor="start" fill="#4b5563" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">SGLANG · INFERENCE ENGINE / KERNEL</text><text x="195.25" y="545.8" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Interpreter</text><text x="195.25" y="566.05" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">creates child</text><text x="195.25" y="586.3" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">requests</text><text x="432.625" y="545.8" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">TAPER scheduler</text><text x="432.625" y="566.05" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">admit per forward</text><text x="432.625" y="586.3" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">pass</text><text x="561.75" y="538.8" text-anchor="start" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">NEXT GPU FORWARD PASS</text><text x="637.625" y="596.05" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Child A</text><text x="637.625" y="616.3" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">running</text><text x="637.625" y="684.55" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Child B</text><text x="637.625" y="704.8" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">running</text><text x="699.375" y="795.05" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Child C</text><text x="699.375" y="815.3" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ready, deferred this</text><text x="699.375" y="835.55" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">pass</text><text x="949.625" y="545.8" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">wait()</text><text x="949.625" y="566.05" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">join KV views</text><text x="195.25" y="654.55" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Shared prefix KV blocks</text><text x="195.25" y="674.8" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">+ small branch-local state</text><text x="699.375" y="485.55" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">continuous batching · radix KV cache</text><text x="545.625" y="996.3" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Model chooses the work graph. Engine chooses</text><text x="545.625" y="1016.55" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">the schedule.</text></g>
</svg>
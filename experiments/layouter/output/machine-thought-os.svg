l"><polyline points="398.8142857142857,314.55 398.8142857142857,395.55 297.03214285714284,395.55 416.2,395.55 416.2,502.79999999999995 195.25,502.79999999999995 195.25,516.8" fill="none" stroke="#ea580c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><path d="M 189.25 504.79999999999995 L 195.25 516.8 L 201.25 504.79999999999995" fill="none" stroke="#ea580c" stroke-width="2" stroke-linejoin="round"/></g><g data-line="resume-parent"><polyline points="949.625,516.8 949.625,407.55 644,407.55 644,360.55 550.25,360.55 550.25,314.55" fill="none" stroke="#7048e8" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><path d="M 556.25 326.55 L 550.25 314.55 L 544.25 326.55" fill="none" stroke="#7048e8" stroke-width="2" stroke-linejoin="round"/></g></g>

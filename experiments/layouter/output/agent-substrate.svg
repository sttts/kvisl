xt x="1435.9" y="749.55" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Persistent Worker Pod — label: ate.dev/worker-pool</text><text x="1770.65" y="842.8" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ateom-visor</text><text x="1770.65" y="863.05" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">runtime helper</text><text x="1493.9" y="948.3" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">gVisor / runsc sandbox — create / start · checkpoint / restore</text><text x="1569.775" y="1029.55" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Agent</text><text x="1569.775" y="1049.8" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">process</text><text x="1752.65" y="1174.05" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Warm free worker Pods</text><text x="1752.65" y="1194.3" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">waiting for actor</text><text x="1752.65" y="1214.55" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">assignment</text><text x="235.25" y="851.55" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">No per-actor Kubernetes object on the hot</text><text x="235.25" y="871.8" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">path.</text><text x="247.125" y="1296.8" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Hot path avoids one Kubernetes object per</text><text x="247.125" y="1317.05" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">actor. Kubernetes provisions capacity;</text><text x="247.125" y="1337.3" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Substrate schedules logical actors.</text><text x="1959.4" y="1296.8" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Security-sensitive boundary: privileged</text><text x="1959.4" y="1317.05" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">worker machinery outside; agent workload</text><text x="1959.4" y="1337.3" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">inside gVisor/runsc sandbox.</text><g><rect x="1146.075" y="609.3" width="156" height="20" rx="4" fill="#ffffff" fill-opacity=".9"/><text x="1224.075" y="624.3" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df">ResumeActor(actorID)</text></g><g><rect x="920.3" y="894.5625" width="274.40000000000003" height="36" rx="4" fill="#ffffff" fill-opacity=".9"/><text x="1057.5" y="909.5625" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df">api.ate-system.svc.cluster.local:443</text><text x="1057.5" y="925.5625" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df">SuspendActor(actorID) · self-suspend</text></g><g><rect x="1098.3" y="971.7375" width="133.8" height="36" rx="4" fill="#ffffff" fill-opacity=".9"/><text x="1165.2" y="986.7375" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7048e8">restore download</text><text x="1165.2" y="1002.7375" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7048e8">checkpoint upload</text></g><g><rect x="630.6142857142856" y="474.55" width="444.6" height="20" rx="4" fill="#ffffff" fill-opacity=".9"/><text x="852.9142857142856" y="489.55" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7d8794">WorkerPool controller maintains warm persistent worker Pods</text></g></g>

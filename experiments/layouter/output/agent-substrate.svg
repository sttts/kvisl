  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">Agent Substrate component design</text><text x="52" y="139.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">Micro-scheduler above Kubernetes: persistent worker Pods, logical</text><text x="52" y="163.5" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">actors, gVisor/runsc checkpoint/restore, Valkey runtime state.</text><text x="65" y="217.8" text-anchor="start" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Ingress / request path</text><text x="125.125" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Client /</text><text x="125.125" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">framework</text><text x="419.5" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Host:</text><text x="419.5" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">&lt;actor&gt;.actors.resources.substrate.ate.dev</text><text x="763.375" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">atenet / Envoy router</text><text x="763.375" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ext_proc handler</text><text x="1020.625" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Forward to worker Pod</text><text x="1020.625" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">IP:80</text><text x="65" y="452.55" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Kubernetes cluster: capacity, templates, controllers, worker Pods</text><text x="87" y="550.8" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Kubernetes API layer</text><text x="217.25" y="618.175" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">WorkerPool CRD</text><text x="217.25" y="638.425" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">replicas + ateom image</text><text x="217.25" y="728.8" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ActorTemplate CRD</text><text x="217.25" y="749.05" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">containers + workerPoolRef</text><text x="217.25" y="769.3" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">snapshot + runsc config</text><text x="441.5" y="550.8" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Substrate control plane</text><text x="728.5" y="632.05" text-anchor="middle" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ateapi</text><text x="728.5" y="652.3" text-anchor="middle" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">gRPC API</text><text x="487.
df" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="10 7"/><path d="M 694.5 526.75 L 700.5 538.75 L 706.5 526.75" fill="none" stroke="#1683df" stroke-width="2" stroke-linejoin="round"/></g><g data-line="request-to-agent"><polyline points="1780.5,256 1799.5,256 1799.5,460.5 1799.5,812.375 1684.5,812.375" fill="none" stroke="#079a72" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><path d="M 1696.5 806.375 L 1684.5 812.375 L 1696.5 818.375" fill="none" stroke="#079a72" stroke-width="2" stroke-linejoin="round"/></g></g>

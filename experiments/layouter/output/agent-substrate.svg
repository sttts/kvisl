  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">Agent Substrate component design</text><text x="52" y="139.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">Micro-scheduler above Kubernetes: persistent worker Pods, logical actors, gVisor/runsc checkpoint/restore, Valkey runtime state.</text><text x="65" y="193.5" text-anchor="start" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Ingress / request path</text><text x="184" y="250.75" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Client /</text><text x="184" y="271" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">framework</text><text x="705.25" y="250.75" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Host:</text><text x="705.25" y="271" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">&lt;actor&gt;.actors.resources.substrate.ate.dev</text><text x="1226.5" y="250.75" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">atenet / Envoy router</text><text x="1226.5" y="271" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ext_proc handler</text><text x="1670.5" y="250.75" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Forward to worker Pod</text><text x="1670.5" y="271" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">IP:80</text><text x="65" y="408.25" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Kubernetes cluster: capacity, templates, controllers, worker Pods</text><text x="87" y="494.5" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Kubernetes API layer</text><text x="217.25" y="577.875" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">WorkerPool CRD</text><text x="217.25" y="598.125" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">replicas + ateom image</text><text x="217.25" y="688.5" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ActorTemplate CRD</text><text x="217.25" y="708.75" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">containers + workerPoolRef</text><text x="217.25" y="729" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">snapshot + runsc config</text><text x="421.5" y="494.5" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Substrate control plane</text><text x="700.5" y="567.75" text-anchor="middle" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ateapi</text><text x="700.5" y="588" text-anchor="middle" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">gRPC API</text><text x="459.5" y="673.25" text-anchor="start" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Valkey / Redis — actor +</text><text x="459.5" y="693.5" text-anchor="start" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">worker truth</text><text x="581.5" y="750.75" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">actor:&lt;id&gt;</text><text x="581.5" y="771" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">status + snapshot refs</text><text x="819.5" y="750.75" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">worker:&lt;ns&gt;:&lt;pool&gt;:&lt;pod&gt;</text><text x="819.5" y="771" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">free / busy</text><text x="421.5" y="888.25" text-anchor="start" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Snapshot storage — GCS / S3-style</text><text x="421.5" y="908.5" text-anchor="start" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">object storage</text><text x="700.5" y="965.75" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">checkpoint.img.zstd</text><text x="700.5" y="986" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">pages.img.zstd + pages_meta.img.zstd</text><text x="1053.5" y="494.5" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Worker node / runtime layer</text><text x="1188.5" y="567.75" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">atelet DaemonSet</text><text x="1188.5" y="588" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">node supervisor</text><text x="1379.5" y="560.75" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Persistent Worker Pod — label:</text><text x="1379.5" y="581" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">ate.dev/worker-pool</text><text x="1544.5" y="638.25" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ateom-visor</text><text x="1544.5" y="658.5" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">runtime helper</text><text x="1417.5" y="743.75" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">gVisor / runsc sandbox —</text><text x="1417.5" y="764" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">create / start ·</text><text x="1417.5" y="784.25" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">checkpoint / restore</text><text x="1552.5" y="841.5" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Agent</text><text x="1552.5" y="861.75" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">process</text><text x="1544.5" y="986" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Warm free worker Pods</text><text x="1544.5" y="1006.25" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">waiting for actor</text><text x="1544.5" y="1026.5" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">assignment</text><text x="225.25" y="811.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">No per-actor Kubernetes object on the hot</text><text x="225.25" y="831.5" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">path.</text><text x="247.125" y="1108.75" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Hot path avoids one Kubernetes object per</text><text x="247.125" y="1129" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">actor. Kubernetes provisions capacity;</text><text x="247.125" y="1149.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Substrate schedules logical actors.</text><text x="1627.5" y="1108.75" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Security-sensitive boundary: privileged</text><text x="1627.5" y="1129" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">worker machinery outside; agent workload</text><text x="1627.5" y="1149.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">inside gVisor/runsc sandbox.</text><g data-line-label="resume-actor"><text x="992.5" y="554.2916666666667" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">ResumeActor(actorID)</text></g><g data-line-label="self-suspend"><text x="1349.5" y="833.75" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">self-suspend</text></g><g data-line-label="self-suspend"><text x="871.3" y="625.25" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">api.ate-system.svc.cluster.local:443</text><text x="871.3" y="641.25" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">SuspendActor(actorID)</text></g><g data-line-label="checkpoint-transfer"><text x="1004.5" y="942" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7048e8" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">restore download</text><text x="1004.5" y="958" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7048e8" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">checkpoint upload</text></g><g data-line-label="worker-pool-controller"><text x="1212.5" y="424.375" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7d8794" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">WorkerPool controller maintains warm persistent worker Pods</text></g></g>
</svg>
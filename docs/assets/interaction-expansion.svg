<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Interaction declarations expand to core entities</title>
  <desc id="desc">On the left, an Interaction with lifelines and ordered messages. On the right, the expansion: lifeline columns with occurrence objects and dashed spines, message lines, an activation bar under an extent constraint, and align plus order constraints. Time never enters the core.</desc>
  <defs>
    <marker id="ieArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <marker id="ieBig" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f6b7c"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .small { font-size: 15px; }
      .label { font-size: 17px; font-weight: 600; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; }
      .muted { fill: #5f6b7c; }
      .decl { fill: #fff8ec; stroke: #e8833a; stroke-width: 2; }
      .head { fill: #eef5ff; stroke: #2878c8; stroke-width: 2.5; }
      .msg { fill: none; stroke: #344054; stroke-width: 3; stroke-linecap: round; }
      .spine { stroke: #7b8798; stroke-width: 2.5; stroke-dasharray: 8 6; }
      .note { fill: #dff5f1; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="618" rx="22" fill="#f8fafc" stroke="#d8dee8" stroke-width="2"/>
  <text x="40" y="42" class="label">Sequence diagrams: the library owns time, the core never sees it</text>

  <!-- declaration side -->
  <text x="40" y="92" class="label">authored — JSX order is temporal order</text>
  <rect x="40" y="110" width="380" height="60" rx="12" class="decl"/>
  <text x="62" y="136" class="mono">&lt;Lifeline id="customer" /&gt;</text>
  <text x="62" y="158" class="mono">&lt;Lifeline id="checkout" /&gt;</text>
  <rect x="40" y="184" width="380" height="38" rx="12" class="decl"/>
  <text x="62" y="208" class="mono">&lt;Message id="submit" … /&gt;</text>
  <rect x="40" y="236" width="380" height="38" rx="12" class="decl"/>
  <text x="62" y="260" class="mono">&lt;Message id="charge" … /&gt;</text>
  <rect x="40" y="288" width="380" height="38" rx="12" class="decl"/>
  <text x="62" y="312" class="mono">&lt;Reply id="confirmation" … /&gt;</text>

  <text x="40" y="380" class="small muted">The Interaction component consumes these typed</text>
  <text x="40" y="404" class="small muted">declarations and derives every occurrence from the</text>
  <text x="40" y="428" class="small muted">messages — no slot lists, no manual alignment.</text>

  <path d="M 452 300 L 530 300" fill="none" stroke="#5f6b7c" stroke-width="4" marker-end="url(#ieBig)"/>
  <text x="491" y="284" text-anchor="middle" class="small muted">expands</text>

  <!-- expansion side -->
  <text x="560" y="92" class="label">normalized — objects, lines, constraints</text>

  <!-- customer lifeline -->
  <rect x="560" y="110" width="170" height="52" rx="10" class="head"/>
  <text x="645" y="142" text-anchor="middle" class="small">customer</text>
  <line x1="645" y1="162" x2="645" y2="540" class="spine"/>
  <circle cx="645" cy="210" r="7" fill="#ffffff" stroke="#344054" stroke-width="3"/>
  <circle cx="645" cy="410" r="7" fill="#ffffff" stroke="#344054" stroke-width="3"/>

  <!-- checkout lifeline with activation -->
  <rect x="850" y="110" width="170" height="52" rx="10" class="head"/>
  <text x="935" y="142" text-anchor="middle" class="small">checkout</text>
  <line x1="935" y1="162" x2="935" y2="540" class="spine"/>
  <rect x="923" y="210" width="24" height="200" rx="5" fill="#ffffff" stroke="#e8833a" stroke-width="3"/>
  <circle cx="935" cy="210" r="7" fill="#ffffff" stroke="#344054" stroke-width="3"/>
  <circle cx="935" cy="310" r="7" fill="#ffffff" stroke="#344054" stroke-width="3"/>
  <circle cx="935" cy="410" r="7" fill="#ffffff" stroke="#344054" stroke-width="3"/>

  <!-- messages -->
  <path d="M 652 210 L 916 210" class="msg" marker-end="url(#ieArrow)"/>
  <text x="790" y="196" text-anchor="middle" class="small">submit(order)</text>
  <path d="M 947 310 L 1120 310" class="msg" marker-end="url(#ieArrow)"/>
  <text x="1035" y="296" text-anchor="middle" class="small">charge(total)</text>
  <path d="M 923 410 L 662 410" class="msg" stroke-dasharray="8 6" marker-end="url(#ieArrow)"/>
  <text x="790" y="396" text-anchor="middle" class="small">confirmation</text>

  <!-- constraint annotations -->
  <rect x="1060" y="180" width="120" height="56" rx="12" class="note"/>
  <text x="1120" y="203" text-anchor="middle" class="small">align:</text>
  <text x="1120" y="223" text-anchor="middle" class="small">one row</text>

  <rect x="1060" y="360" width="120" height="76" rx="12" class="note"/>
  <text x="1120" y="386" text-anchor="middle" class="small">order:</text>
  <text x="1120" y="406" text-anchor="middle" class="small">below the</text>
  <text x="1120" y="426" text-anchor="middle" class="small">previous row</text>

  <rect x="790" y="470" width="290" height="40" rx="12" class="note"/>
  <text x="935" y="495" text-anchor="middle" class="small">activation = object + extent(from, to)</text>

  <text x="600" y="570" text-anchor="middle" class="small muted">
    <tspan x="600">Occurrences exist only where a lifeline participates. Per message: one line and one align constraint;</tspan>
    <tspan x="600" dy="22">consecutive messages chain with spatial order. Fragments become frames over their occurrences.</tspan>
  </text>
</svg>

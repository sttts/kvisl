<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">The style cascade: five layers instead of specificity</title>
  <desc id="desc">Five cascade layers from renderer default to inline style, with tokens resolved through the same precedence. A node on the right shows which layer supplied each resolved property.</desc>
  <defs>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .small { font-size: 15px; }
      .label { font-size: 17px; font-weight: 600; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; }
      .muted { fill: #5f6b7c; }
      .layer { rx: 12; stroke-width: 2; }
    </style>
    <marker id="rcArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f6b7c"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1198" height="538" rx="22" fill="#f8fafc" stroke="#d8dee8" stroke-width="2"/>
  <text x="40" y="42" class="label">Presentation is rules: a layered cascade, no specificity arithmetic</text>

  <!-- the five layers, weakest at the bottom -->
  <rect x="40" y="430" width="430" height="56" class="layer" fill="#f3f5f8" stroke="#aab4c2"/>
  <text x="64" y="458" class="label">renderer default</text>
  <text x="64" y="478" class="mono muted">stroke: ink · fontSize: 14</text>

  <rect x="40" y="346" width="430" height="72" class="layer" fill="#eaf7f5" stroke="#18a999"/>
  <text x="64" y="374" class="label">theme</text>
  <text x="64" y="394" class="mono muted">tokens({ large: 24, "pale-blue": "#dbeafe" })</text>
  <text x="64" y="412" class="mono muted">rule(role("service"), { fill: "pale-blue" })</text>

  <rect x="40" y="278" width="430" height="56" class="layer" fill="#fff8ec" stroke="#e8833a"/>
  <text x="64" y="306" class="label">library</text>
  <text x="64" y="326" class="mono muted">rule(role("uml-dependency"), { dash: "dashed" })</text>

  <rect x="40" y="194" width="430" height="72" class="layer" fill="#eef5ff" stroke="#2878c8"/>
  <text x="64" y="222" class="label">document</text>
  <text x="64" y="242" class="mono muted">tokens({ large: 32 })   ← overrides the theme token</text>
  <text x="64" y="260" class="mono muted">rule(cls("critical"), { stroke: "alert-red" })</text>

  <rect x="40" y="126" width="430" height="56" class="layer" fill="#f1edff" stroke="#6d4aff"/>
  <text x="64" y="154" class="label">inline style prop</text>
  <text x="64" y="174" class="mono muted">style={{ strokeWidth: 3 }}</text>

  <path d="M 500 458 L 500 140" fill="none" stroke="#5f6b7c" stroke-width="3" marker-end="url(#rcArrow)"/>
  <text x="516" y="290" class="small muted">higher layer wins;</text>
  <text x="516" y="312" class="small muted">within a layer,</text>
  <text x="516" y="334" class="small muted">later rules win</text>

  <!-- resolved result -->
  <text x="700" y="120" class="label">resolved for one object</text>
  <rect x="700" y="140" width="300" height="110" rx="16" fill="#dbeafe" stroke="#c0392b" stroke-width="3"/>
  <text x="850" y="188" text-anchor="middle" class="label">orders-service</text>
  <text x="850" y="212" text-anchor="middle" class="mono muted">role="service" class="critical"</text>

  <text x="700" y="300" class="mono">fill: "pale-blue"</text>
  <text x="960" y="300" class="small muted">← theme rule + theme token</text>
  <text x="700" y="330" class="mono">stroke: "alert-red"</text>
  <text x="960" y="330" class="small muted">← document rule</text>
  <text x="700" y="360" class="mono">strokeWidth: 3</text>
  <text x="960" y="360" class="small muted">← inline style</text>
  <text x="700" y="390" class="mono">gap: "large" → 32</text>
  <text x="960" y="390" class="small muted">← document token wins</text>
  <text x="700" y="420" class="mono">fontSize: 14</text>
  <text x="960" y="420" class="small muted">← renderer default</text>

  <text x="600" y="500" text-anchor="middle" class="small muted">
    <tspan x="600">Rules set presentation and metric defaults only — never topology, membership, ports, or existence.</tspan>
    <tspan x="600" dy="22">Structural selectors stop at component boundaries; roles and classes are the public styling API.</tspan>
  </text>
</svg>

  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">Whitespace is the routing plane</text><text x="52" y="139.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">Two named buses refine one implicit gap; tracks reserve the room they need.</text><text x="65" y="193.5" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">system</text><text x="87" y="243.75" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">control plane</text><text x="206" y="306.875" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">scheduler</text><text x="474" y="306.875" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">gateway</text><text x="87" y="465.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">fleet</text><text x="206" y="544.325" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">cluster A</text><text x="458" y="544.325" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">cluster B</text><text x="710" y="544.325" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">external endpoint</text><g data-line-label="placement-cluster-a"><text x="160.7" y="411.5" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#f97316" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">placement</text></g><g data-line-label="request-external"><text x="573.5" y="396.90000000000003" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7c3aed" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">request routing</text></g></g>
